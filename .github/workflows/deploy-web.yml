name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @quizstrike/shared

      - name: Build web app
        run: npm run build -w @quizstrike/web
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.gyakuteneigo.com' }}
          VITE_API_FALLBACK_URL: ${{ vars.VITE_API_FALLBACK_URL || 'https://gyakuteneigo-api.onrender.com' }}
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}

      - name: Configure SPA fallback and optional custom domain
        shell: bash
        env:
          PAGE_CUSTOM_DOMAIN: ${{ vars.PAGE_CUSTOM_DOMAIN || 'www.gyakuteneigo.com' }}
        run: |
          cp apps/web/dist/index.html apps/web/dist/404.html
          for route in quiz-strike join game; do
            mkdir -p "apps/web/dist/$route"
            cp apps/web/dist/index.html "apps/web/dist/$route/index.html"
          done
          echo "$PAGE_CUSTOM_DOMAIN" > apps/web/dist/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
